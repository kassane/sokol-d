name: D

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-24.04-arm, ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-master

      - name: prepare-linux
        if: runner.os == 'Linux'
        run: |
            sudo apt-get update
            sudo apt-get install libglu1-mesa-dev mesa-common-dev xorg-dev libasound-dev

      # - name: (dub) Build Native
      #   run: dub -- --download-emsdk --download-zig --download-imgui --download-sokol-tools
      - name: (dub) Genshaders
        run: dub build -c genshaders -v
      - name: (dub) Build sokol-static
        run: dub build -v
      - name: (dub) Build sokol-shared
        run: dub build -c sokol-shared -v      
      - name: (dub) Build imgui-static
        run: dub build -c imgui-static -v
      - name: (dub) Build imgui-shared
        run: dub build -c imgui-shared -v
      - name: (dub) Build imgui + emscripten
        run: dub build -c imgui-wasm -v
      - name: (dub) Build sokol-wgpu
        run: dub build -c sokol-wgpu -v
      - name: (dub) Build sokol-wgles3
        run: dub build -c sokol-wgles3 -v
